cucumber.glue=io.trupeer.automation.stepdefinitions, io.trupeer.automation.hooks
cucumber.plugin=pretty, html:target/cucumber-reports/report.html, json:target/cucumber-reports/report.json, com.aventstack.extentreports.cucumber.adapter.ExtentCucumberAdapter:
cucumber.publish.quiet=true

# UI tests run sequentially (one shared browser/session across the run).
cucumber.execution.parallel.enabled=false
